<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude AI for Word</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #d4a843;
      --accent2: #e8c06a;
      --text: #e8e8ec;
      --muted: #8888a0;
      --user-bubble: #1e2a3a;
      --ai-bubble: #1a1a1f;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #000;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 15px; font-weight: 400;
      color: var(--text); letter-spacing: 0.02em;
    }
    .header-text p { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .settings-btn {
      margin-left: auto;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      font-size: 16px;
    }
    .settings-btn:hover { color: var(--text); background: var(--surface2); }

    /* API Key Panel */
    .api-panel {
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }
    .api-panel.show { display: block; }
    .api-panel label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
    .api-row { display: flex; gap: 6px; }
    .api-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text);
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-input:focus { border-color: var(--accent); }
    .save-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .save-btn:hover { background: var(--accent2); }

    /* Quick Actions */
    .quick-actions {
      padding: 10px 16px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .welcome {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
    }
    .welcome .icon { font-size: 32px; margin-bottom: 10px; }
    .welcome h2 { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 400; }
    .welcome p { font-size: 12px; line-height: 1.6; }

    .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { align-items: flex-end; }
    .msg.ai { align-items: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 10px 13px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2a3a50;
      border-bottom-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-label { font-size: 10px; color: var(--muted); padding: 0 4px; letter-spacing: 0.04em; }

    /* Typing indicator */
    .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }

    /* Context toggle */
    .context-bar {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .context-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      user-select: none;
    }
    .toggle-switch {
      width: 28px; height: 15px;
      background: var(--border);
      border-radius: 20px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: var(--accent); }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 11px; height: 11px;
      background: white;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle-switch.on .toggle-knob { left: 15px; }
    .context-label { flex: 1; }

    /* Input area */
    .input-area {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.2s;
      overflow-y: auto;
    }
    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-bar {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 14px;
      letter-spacing: 0.02em;
    }
    .status-bar.ok { color: #4caf7d; }
    .status-bar.err { color: #e05a5a; }

    /* Insert btn inside AI bubble */
    .insert-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .insert-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">C</div>
  <div class="header-text">
    <h1>Claude for Word</h1>
    <p>Powered by Anthropic API</p>
  </div>
  <button class="settings-btn" onclick="toggleSettings()" title="Cài đặt API Key">⚙</button>
</div>

<!-- API Key Panel -->
<div class="api-panel" id="apiPanel">
  <label>Anthropic API Key</label>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <button class="save-btn" onclick="saveKey()">Lưu</button>
  </div>
  <div class="status-bar" id="keyStatus"></div>
</div>

<!-- Quick Actions -->
<div class="quick-actions">
  <button class="quick-btn" onclick="quickAction('Sửa lỗi chính tả và ngữ pháp đoạn văn này')">✏️ Sửa lỗi</button>
  <button class="quick-btn" onclick="quickAction('Viết lại đoạn văn này ngắn gọn hơn')">✂️ Ngắn gọn</button>
  <button class="quick-btn" onclick="quickAction('Dịch đoạn văn này sang tiếng Anh')">🌐 Dịch EN</button>
  <button class="quick-btn" onclick="quickAction('Tóm tắt nội dung đoạn văn này')">📋 Tóm tắt</button>
  <button class="quick-btn" onclick="quickAction('Viết lại chuyên nghiệp hơn')">💼 Chuyên nghiệp</button>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="icon">✦</div>
    <h2>Claude sẵn sàng hỗ trợ</h2>
    <p>Chọn văn bản trong Word rồi hỏi Claude,<br>hoặc nhập câu hỏi trực tiếp bên dưới.</p>
  </div>
</div>

<!-- Context Toggle -->
<div class="context-bar">
  <div class="context-toggle" onclick="toggleContext()">
    <div class="toggle-switch on" id="contextSwitch"><div class="toggle-knob"></div></div>
    <span class="context-label">Gửi kèm văn bản đang chọn trong Word</span>
  </div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <textarea class="input-box" id="userInput" placeholder="Nhập yêu cầu..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="status-bar" id="statusBar"></div>
</div>

<script>
  let useContext = true;
  let isLoading = false;
  let conversationHistory = [];

  // Init Office.js
  Office.onReady(info => {
    if (info.host === Office.HostType.Word) {
      setStatus('Word đã kết nối ✓', 'ok');
    }
  });

  // Load saved API key
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('claude_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      setStatus('API key đã lưu ✓', 'ok');
    } else {
      toggleSettings();
      setStatus('Vui lòng nhập API key để bắt đầu', '');
    }
  });

  function toggleSettings() {
    const panel = document.getElementById('apiPanel');
    panel.classList.toggle('show');
  }

  function saveKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key.startsWith('sk-ant-')) {
      document.getElementById('keyStatus').textContent = '⚠ API key không hợp lệ';
      document.getElementById('keyStatus').className = 'status-bar err';
      return;
    }
    localStorage.setItem('claude_api_key', key);
    document.getElementById('keyStatus').textContent = '✓ Đã lưu';
    document.getElementById('keyStatus').className = 'status-bar ok';
    setTimeout(() => toggleSettings(), 800);
  }

  function toggleContext() {
    useContext = !useContext;
    const sw = document.getElementById('contextSwitch');
    sw.classList.toggle('on', useContext);
  }

  function quickAction(prompt) {
    document.getElementById('userInput').value = prompt;
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar' + (type ? ' ' + type : '');
  }

  async function getSelectedText() {
    return new Promise((resolve) => {
      Word.run(async (context) => {
        const selection = context.document.getSelection();
        selection.load('text');
        await context.sync();
        resolve(selection.text.trim());
      }).catch(() => resolve(''));
    });
  }

  async function insertTextToWord(text) {
    return Word.run(async (context) => {
      const selection = context.document.getSelection();
      selection.insertText(text, Word.InsertLocation.replace);
      await context.sync();
    });
  }

  function addMessage(role, content, showInsert = false) {
    const chatArea = document.getElementById('chatArea');

    // Remove welcome
    const welcome = chatArea.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Bạn' : 'Claude';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    msg.appendChild(label);
    msg.appendChild(bubble);

    if (role === 'ai' && showInsert) {
      const insertBtn = document.createElement('button');
      insertBtn.className = 'insert-btn';
      insertBtn.innerHTML = '↩ Chèn vào Word';
      insertBtn.onclick = async () => {
        await insertTextToWord(content);
        insertBtn.innerHTML = '✓ Đã chèn';
        insertBtn.style.color = '#4caf7d';
        insertBtn.style.borderColor = '#4caf7d';
      };
      bubble.appendChild(document.createElement('br'));
      bubble.appendChild(insertBtn);
    }

    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function addTyping() {
    const chatArea = document.getElementById('chatArea');
    const msg = document.createElement('div');
    msg.className = 'msg ai typing';
    msg.id = 'typingIndicator';
    msg.innerHTML = `
      <div class="msg-label">Claude</div>
      <div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    if (isLoading) return;

    const apiKey = localStorage.getItem('claude_api_key');
    if (!apiKey) {
      toggleSettings();
      setStatus('Vui lòng nhập API key trước', 'err');
      return;
    }

    const input = document.getElementById('userInput');
    const userText = input.value.trim();
    if (!userText) return;

    // Get selected Word text
    let selectedText = '';
    if (useContext) {
      selectedText = await getSelectedText();
    }

    // Build full prompt
    let fullPrompt = userText;
    if (selectedText) {
      fullPrompt = `Văn bản được chọn trong Word:\n"""\n${selectedText}\n"""\n\nYêu cầu: ${userText}`;
    }

    // Show user message
    addMessage('user', selectedText ? `${userText}\n[📄 Kèm ${selectedText.length} ký tự từ Word]` : userText);

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    setStatus('Claude đang suy nghĩ...', '');
    addTyping();

    // Build messages
    conversationHistory.push({ role: 'user', content: fullPrompt });

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2048,
          system: 'Bạn là trợ lý AI hỗ trợ soạn thảo văn bản trong Microsoft Word. Trả lời bằng tiếng Việt, ngắn gọn và hữu ích. Khi được yêu cầu chỉnh sửa văn bản, chỉ trả về văn bản đã chỉnh sửa, không giải thích dài dòng.',
          messages: conversationHistory
        })
      });

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });

      removeTyping();
      addMessage('ai', reply, true);
      setStatus(`✓ ${data.usage?.output_tokens || '?'} tokens · Haiku`, 'ok');

    } catch (err) {
      removeTyping();
      addMessage('ai', `⚠ Lỗi: ${err.message}`);
      setStatus('Có lỗi xảy ra', 'err');
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }
</script>
</body>
</html>
